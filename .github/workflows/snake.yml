name: Generate Snake Animation

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:     # Allows manual trigger

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: pranto2051
          outputs_dir: ./
          outputs: |
            github-contribution-grid-snake-dark.svg

      - name: Verify file was created
        run: |
          if [ -f github-contribution-grid-snake-dark.svg ]; then
            echo "✅ Snake SVG generated successfully"
            ls -lh github-contribution-grid-snake-dark.svg
          else
            echo "❌ Snake SVG not found"
            ls -la
            exit 1
          fi

      - name: Commit and push changes
        uses: actions/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'Generate Contributions Snake Animation'
          add: 'github-contribution-grid-snake-dark.svg'
